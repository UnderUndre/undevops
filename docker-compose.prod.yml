services:
  traefik:
    image: traefik:v3
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt_data:/letsencrypt

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-undevops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-undevops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-undevops}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.undevops.rule=Host(`${UNDEVOPS_DOMAIN}`)"
      - "traefik.http.routers.undevops.entrypoints=websecure"
      - "traefik.http.routers.undevops.tls.certresolver=letsencrypt"
      - "traefik.http.services.undevops.loadbalancer.server.port=3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-undevops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-undevops}
      REDIS_URL: redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379
      NODE_ENV: production
      NEXTAUTH_URL: https://${UNDEVOPS_DOMAIN}
      UNDEVOPS_ENCRYPTION_KEY: ${UNDEVOPS_ENCRYPTION_KEY:?Set UNDEVOPS_ENCRYPTION_KEY}
      UNDEVOPS_BACKUP_ENCRYPTION_KEY: ${UNDEVOPS_BACKUP_ENCRYPTION_KEY:-}
      UNDEVOPS_DOMAIN: ${UNDEVOPS_DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - traefik

  api:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-undevops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-undevops}
      REDIS_URL: redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379
      NODE_ENV: production
      UNDEVOPS_ENCRYPTION_KEY: ${UNDEVOPS_ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.schedule
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-undevops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-undevops}
      REDIS_URL: redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379
      NODE_ENV: production
      UNDEVOPS_ENCRYPTION_KEY: ${UNDEVOPS_ENCRYPTION_KEY}
      UNDEVOPS_BACKUP_ENCRYPTION_KEY: ${UNDEVOPS_BACKUP_ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  mcp-server:
    build:
      context: .
      dockerfile: apps/mcp-server/Dockerfile
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.undevops-mcp.rule=Host(`mcp.${UNDEVOPS_DOMAIN}`)"
      - "traefik.http.routers.undevops-mcp.entrypoints=websecure"
      - "traefik.http.routers.undevops-mcp.tls.certresolver=letsencrypt"
      - "traefik.http.services.undevops-mcp.loadbalancer.server.port=3003"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-undevops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-undevops}
      REDIS_URL: redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379
      NODE_ENV: production
      UNDEVOPS_ENCRYPTION_KEY: ${UNDEVOPS_ENCRYPTION_KEY}
      MCP_SSE_PORT: "3003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - traefik

  monitoring:
    build:
      context: .
      dockerfile: Dockerfile.monitoring
    restart: unless-stopped
    environment:
      PORT: "3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  letsencrypt_data:

networks:
  internal:
    internal: true
  traefik:
